<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraTravel - Thank You</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .thankyou-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 2rem;
        }

        .thankyou-card {
            width: 100%;
            max-width: 500px;
            padding: 3rem;
            text-align: center;
        }

        .thankyou-card h1 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        .thankyou-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="brand">AuraTravel</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html">Search Routes</a>
            <a href="about.html">About</a>
            <a href="profile.html">Profile</a>
            <a href="login.html" class="btn-primary" id="nav-login-btn">Sign In</a>
        </div>
    </nav>
    <script src="nav.js"></script>

    <div class="thankyou-container">
        <div class="glass-panel thankyou-card animate-in">
            <h1>Booking Confirmed!</h1>
            <p>Thank you for exploring with AuraTravel. Your payment has been securely processed and your seat is secured.</p>
            <p style="font-size: 0.9rem; margin-bottom: 2rem;">Have a Safe Journey.</p>
            <a href="index.html" class="btn-primary" style="width: 100%;">Return to Home</a>
        </div>
    </div>
