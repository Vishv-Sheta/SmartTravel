<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraTravel - Secure Checkout</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .checkout-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 2rem;
        }

        .payment-card {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
        }

        .payment-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .payment-header h2 {
            margin-bottom: 0.5rem;
        }

        .price-display {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 1rem;
            text-align: center;
        }

        .loader {
            display: none;
            width: 48px;
            height: 48px;
            border: 5px solid var(--glass-border);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .success-msg {
            display: none;
            text-align: center;
            color: #10b981;
            /* green */
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="brand">AuraTravel</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html">Search Routes</a>
            <a href="about.html">About</a>
            <a href="profile.html">Profile</a>
            <a href="login.html" class="btn-primary" id="nav-login-btn">Sign In</a>
        </div>
    </nav>
    <script src="nav.js"></script>

    <div class="checkout-container">
        <div class="glass-panel payment-card animate-in">
            <div class="payment-header">
                <h2>Secure Checkout</h2>
                <p style="color: var(--text-muted);">Please review your total and enter payment details.</p>
            </div>

            <div class="price-display" id="display-price">$0.00</div>

            <form id="payment-form">
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19" required>
                </div>
                <div style="display:flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Expiry (MM/YY)</label>
                        <input type="text" class="form-control" placeholder="12/26" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CVV</label>
                        <input type="password" class="form-control" placeholder="123" maxlength="3" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width:100%; margin-top: 1rem; height: 50px;"
                    id="pay-btn">Complete Payment</button>
            </form>

            <div class="loader" id="loader"></div>

            <div class="success-msg" id="success-msg">
                <h2 style="margin-bottom: 1rem;">🎉 Payment Successful!</h2>
                <p style="color: var(--text-main);">Your transaction was processed successfully. ID: <span
                        id="txn-id"></span></p>
                <button class="btn-primary" style="margin-top: 1.5rem; width: 100%;"
                    onclick="location.href='thankyou.html'">Return Home</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                alert("Please sign in to securely book travel routes.");
                window.location.href = 'login.html';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const routeId = urlParams.get('routeId');

            if (routeId) {
                fetch(`/api/routes/${routeId}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.success && data.route) {
                            document.getElementById('display-price').innerText = `₹${data.route.price}`;
                        } else {
                            alert("Invalid route selected.");
                            window.location.href = 'search.html';
                        }
                    })
                    .catch(err => console.error(err));
            } else {
                alert("No route selected");
                window.location.href = 'search.html';
            }

            document.getElementById('payment-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const form = document.getElementById('payment-form');
                const loader = document.getElementById('loader');
                const successMsg = document.getElementById('success-msg');

                form.style.display = 'none';
                loader.style.display = 'block';

                try {
                    // Directly post to Secure Booking API which handles payment auth internally
                    const res = await fetch('/bookings', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ routeId: routeId, cardNumber: 'XXXX' })
                    });

                    const data = await res.json();

                    loader.style.display = 'none';
                    if (data.success) {
                        document.getElementById('txn-id').innerText = data.transactionId;
                        successMsg.style.display = 'block';
                    } else {
                        form.style.display = 'block';
                        alert(data.message || 'Payment/Booking failed. Please try again.');
                    }
                } catch (err) {
                    console.error(err);
                    loader.style.display = 'none';
                    form.style.display = 'block';
                    alert('Network error while securely checking out.');
                }
            });
        });
    </script>
</body>

</html>
