<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraTravel - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 2rem;
        }

        .profile-card {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            text-align: center;
        }

        .profile-card h2 {
            margin-bottom: 2rem;
            color: var(--primary);
        }

        .info-group {
            margin-bottom: 1.5rem;
            text-align: left;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .info-group span {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .info-group strong {
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            text-decoration: none;
            flex: 1;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="brand">AuraTravel</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html">Search Routes</a>
            <a href="about.html">About</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <div class="profile-container">
        <div class="glass-panel profile-card animate-in">
            <h2>Your Profile</h2>
            
            <div class="info-group">
                <span>Full Name</span>
                <strong id="userName">Loading...</strong>
            </div>
            
            <div class="info-group">
                <span>Email Address</span>
                <strong id="userEmail">Loading...</strong>
            </div>

            <div class="action-buttons">
                <a href="editprofile.html" class="btn-primary" style="flex: 1; text-align: center;">Edit Profile</a>
                <button onclick="logout()" class="btn-danger">Logout</button>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem("token");

            if (!token) {
                alert("Please login first.");
                window.location.href = "login.html";
            }

            fetch("/api/user/me", {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            })
                .then(res => res.json())
                .then(user => {
                    document.getElementById("userName").textContent = user.name || "Unknown User";
                    document.getElementById("userEmail").textContent = user.email || "Unknown Email";
                })
                .catch(err => {
                    alert("Session expired or error loading profile.");
                    console.error(err);
                    window.location.href = "login.html";
                });
        });
    </script>
</body>
</html>
